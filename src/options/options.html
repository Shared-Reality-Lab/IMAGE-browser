<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <form>
            <div class="browser-style">
                <input type="checkbox" id="mono-sound" name="mono-sound">
                <label for="mono-sound" id="monoSoundLabel"></label>
            </div>
            <div class="browser-style">
                <input type="checkbox" id="stereo-headphones" name="stereo-headphones">
                <label for="stereo-headphones" id="stereoHeadphonesLabel"></label>
            </div>
            <div class="browser-style">
                <input type="checkbox" id="vibration-phone" name="vibration-phone">
                <label for="vibration-phone" id="vibrationPhoneLabel"></label>
            </div>
            <div class="browser-style">
                <input type="checkbox" id="vibration-watch" name="vibration-watch">
                <label for="vibration-watch" id="vibrationWatchLabel"></label>
            </div>
            <div class="browser-style">
                <input type="checkbox" id="braille-reader" name="braille-reader">
                <label for="braille-reader" id="brailleReaderLabel"></label>
            </div>
            <div class="browser-style">
                <input type="checkbox" id="haptic-explorer" name="haptic-explorer">
                <label for="haptic-explorer" id="hapticExplorerLabel"></label>
            </div>
            <button class="browser-style" type="submit" id="preferences-submit"></button>
        </form>
        <script type="text/javascript" src="./options.ts"></script>
    </body>
</html>
